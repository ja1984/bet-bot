<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bet Bot Predictions</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js"></script>
  <style>
    :root {
      --bg: #0f1117; --surface: #1a1d27; --surface-hover: #222632;
      --border: #2a2e3b; --text: #e1e4ed; --text-muted: #8b90a0;
      --accent: #6c5ce7; --accent-light: #a29bfe; --red: #e17055; --radius: 10px;
      --strong: #fff; --code-bg: rgba(255,255,255,0.06); --pre-bg: rgba(0,0,0,0.3);
      --table-even: rgba(255,255,255,0.02); --accent-bg: rgba(108,92,231,0.12);
      --accent-bg-light: rgba(108,92,231,0.1);
    }
    [data-theme="light"] {
      --bg: #f5f6fa; --surface: #ffffff; --surface-hover: #eef0f6;
      --border: #d9dce6; --text: #2d3142; --text-muted: #6b7084;
      --accent: #5a4bd1; --accent-light: #5a4bd1; --red: #d63031;
      --strong: #1a1d27; --code-bg: rgba(0,0,0,0.06); --pre-bg: rgba(0,0,0,0.05);
      --table-even: rgba(0,0,0,0.02); --accent-bg: rgba(108,92,231,0.08);
      --accent-bg-light: rgba(108,92,231,0.07);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.6;
    }
    .container { max-width: 820px; margin: 0 auto; padding: 2rem 1.5rem; }
    header { text-align: center; margin-bottom: 2.5rem; padding-bottom: 2rem; border-bottom: 1px solid var(--border); }
    header h1 { font-size: 1.75rem; font-weight: 700; margin-bottom: 0.35rem; }
    header h1 span { color: var(--accent-light); }
    header p { color: var(--text-muted); font-size: 0.95rem; }

    .file-list { display: flex; flex-direction: column; gap: 0.5rem; }
    .file-item {
      display: flex; align-items: center; gap: 1rem; padding: 1rem 1.25rem;
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      cursor: pointer; transition: background 0.15s, border-color 0.15s;
      text-decoration: none; color: inherit;
    }
    .file-item:hover { background: var(--surface-hover); border-color: var(--accent); }
    .file-date {
      font-size: 0.8rem; font-weight: 600; color: var(--accent-light);
      background: var(--accent-bg); padding: 0.3rem 0.65rem; border-radius: 6px;
      white-space: nowrap; font-variant-numeric: tabular-nums;
    }
    .file-league { font-weight: 600; font-size: 0.95rem; flex: 1; }
    .file-arrow { color: var(--text-muted); font-size: 1.1rem; transition: transform 0.15s; }
    .file-item:hover .file-arrow { transform: translateX(3px); }

    .detail-view { display: none; }
    .back-btn {
      display: inline-flex; align-items: center; gap: 0.4rem;
      color: var(--accent-light); background: none; border: none;
      font-size: 0.9rem; font-weight: 500; cursor: pointer;
      padding: 0.5rem 0; margin-bottom: 1.25rem;
    }
    .back-btn:hover { opacity: 0.75; }
    .detail-title {
      font-size: 1.3rem; font-weight: 700; margin-bottom: 1.25rem;
      padding-bottom: 1rem; border-bottom: 1px solid var(--border);
    }

    .md-body { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem 1.75rem; }
    .md-body h1,.md-body h2,.md-body h3 { margin-top: 1.5rem; margin-bottom: 0.75rem; font-weight: 700; }
    .md-body h1:first-child,.md-body h2:first-child { margin-top: 0; }
    .md-body h1 { font-size: 1.4rem; }
    .md-body h2 { font-size: 1.15rem; color: var(--accent-light); }
    .md-body h3 { font-size: 1rem; color: var(--text-muted); }
    .md-body p { margin-bottom: 0.75rem; }
    .md-body ul,.md-body ol { margin: 0.5rem 0 1rem 1.5rem; }
    .md-body li { margin-bottom: 0.3rem; }
    .md-body table { width: 100%; border-collapse: collapse; margin: 1rem 0; font-size: 0.9rem; }
    .md-body th,.md-body td { padding: 0.6rem 0.85rem; border: 1px solid var(--border); text-align: left; }
    .md-body th { background: var(--accent-bg-light); font-weight: 600; color: var(--accent-light); }
    .md-body tr:nth-child(even) td { background: var(--table-even); }
    .md-body code { background: var(--code-bg); padding: 0.15rem 0.4rem; border-radius: 4px; font-size: 0.85em; }
    .md-body pre { background: var(--pre-bg); padding: 1rem; border-radius: 8px; overflow-x: auto; margin: 1rem 0; }
    .md-body pre code { background: none; padding: 0; }
    .md-body strong { color: var(--strong); }
    .md-body hr { border: none; border-top: 1px solid var(--border); margin: 1.5rem 0; }

    .loading,.error-msg { text-align: center; padding: 3rem 1rem; color: var(--text-muted); }
    .error-msg { color: var(--red); }
    .spinner {
      display: inline-block; width: 24px; height: 24px;
      border: 3px solid var(--border); border-top-color: var(--accent-light);
      border-radius: 50%; animation: spin 0.7s linear infinite; margin-bottom: 0.75rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty-state { text-align: center; padding: 4rem 1rem; color: var(--text-muted); }
    .empty-state .icon { font-size: 2.5rem; margin-bottom: 1rem; }
    .theme-toggle {
      position: absolute; top: 2rem; right: 1.5rem;
      background: var(--surface); border: 1px solid var(--border); border-radius: 50px;
      padding: 0.35rem 0.6rem; cursor: pointer; font-size: 1.1rem; line-height: 1;
      transition: background 0.15s, border-color 0.15s;
    }
    .theme-toggle:hover { border-color: var(--accent); }
    @media(max-width:600px) {
      .container { padding: 1.25rem 1rem; }
      .file-item { padding: 0.85rem 1rem; gap: 0.75rem; }
      .md-body { padding: 1.25rem 1rem; }
    }
  </style>
</head>
<body>
  <div class="container" style="position: relative;">
    <header>
      <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme" onclick="toggleTheme()">&#9790;</button>
      <h1>&#9917; <span>Bet Bot</span> Predictions</h1>
      <p>Match analysis &amp; predictions archive</p>
    </header>
    <div id="list-view">
      <div id="file-list" class="file-list">
        <div class="loading"><div class="spinner"></div><p>Loading predictions&#8230;</p></div>
      </div>
    </div>
    <div id="detail-view" class="detail-view">
      <button class="back-btn" onclick="showList()">&#8592; Back to list</button>
      <div class="detail-title" id="detail-title"></div>
      <div class="md-body" id="md-content"></div>
    </div>
  </div>

  <script>
    // === THEME ===
    function applyTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      document.getElementById('theme-toggle').textContent = theme === 'light' ? '\u2600' : '\u263E';
    }
    function toggleTheme() {
      var current = localStorage.getItem('theme') || 'dark';
      var next = current === 'dark' ? 'light' : 'dark';
      localStorage.setItem('theme', next);
      applyTheme(next);
    }
    applyTheme(localStorage.getItem('theme') || 'dark');

    // === CONFIG — change these if needed ===
    const OWNER = 'ja1984';
    const REPO  = 'bet-bot';
    const FOLDER = 'predictions';
    const BRANCH = 'main';
    const API_BASE = 'https://api.github.com/repos/' + OWNER + '/' + REPO;

    let files = [];

    function parseFileName(name) {
      const w = name.replace(/\.md$/i, '');
      const m = w.match(/^(\d{4}-\d{2}-\d{2})-(.+)$/);
      if (!m) return { date: '', league: w, raw: name };
      const league = m[2].replace(/-/g, ' ').replace(/\b\w/g, function(c) { return c.toUpperCase(); });
      return { date: m[1], league: league, raw: name };
    }

    function formatDate(ds) {
      try {
        var d = new Date(ds + 'T00:00:00');
        return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
      } catch(e) { return ds; }
    }

    async function loadFileList() {
      var el = document.getElementById('file-list');
      try {
        var res = await fetch(API_BASE + '/contents/' + FOLDER + '?ref=' + BRANCH);
        if (!res.ok) throw new Error('GitHub API returned ' + res.status);
        var data = await res.json();

        files = data
          .filter(function(f) { return f.name.endsWith('.md'); })
          .map(function(f) {
            var copy = Object.assign({}, f);
            copy.parsed = parseFileName(f.name);
            return copy;
          })
          .sort(function(a, b) { return b.parsed.date.localeCompare(a.parsed.date); });

        if (!files.length) {
          el.innerHTML = '<div class="empty-state"><div class="icon">&#128237;</div><p>No prediction files found yet.</p></div>';
          return;
        }

        el.innerHTML = files.map(function(f, i) {
          return '<a class="file-item" onclick="showDetail(' + i + ')" role="button" tabindex="0">'
            + '<span class="file-date">' + formatDate(f.parsed.date) + '</span>'
            + '<span class="file-league">' + f.parsed.league + '</span>'
            + '<span class="file-arrow">&#8594;</span></a>';
        }).join('');

        handleHash();
      } catch(err) {
        el.innerHTML = '<div class="error-msg">Failed to load: ' + err.message + '</div>';
      }
    }

    async function showDetail(i) {
      var file = files[i];
      if (!file) return;
      document.getElementById('list-view').style.display = 'none';
      document.getElementById('detail-view').style.display = 'block';
      document.getElementById('detail-title').textContent = formatDate(file.parsed.date) + ' \u2014 ' + file.parsed.league;
      document.getElementById('md-content').innerHTML = '<div class="loading"><div class="spinner"></div><p>Loading&#8230;</p></div>';
      window.location.hash = file.name;
      try {
        var res = await fetch(file.download_url);
        if (!res.ok) throw new Error('Failed to fetch');
        var md = await res.text();
        document.getElementById('md-content').innerHTML = marked.parse(md);
      } catch(err) {
        document.getElementById('md-content').innerHTML = '<div class="error-msg">' + err.message + '</div>';
      }
    }

    function showList() {
      document.getElementById('list-view').style.display = 'block';
      document.getElementById('detail-view').style.display = 'none';
      window.location.hash = '';
    }

    function handleHash() {
      var h = decodeURIComponent(window.location.hash.replace('#', ''));
      if (!h) return;
      var idx = files.findIndex(function(f) { return f.name === h; });
      if (idx !== -1) showDetail(idx);
    }

    window.addEventListener('hashchange', handleHash);
    loadFileList();
  </script>
</body>
</html>

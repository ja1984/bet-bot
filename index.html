<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bet Bot Predictions</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { dark: '#0f172a', darkSurface: '#1e293b' }
                }
            }
        }
    </script>

    <style>
        /* Glassmorphism effects */
        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(229, 231, 235, 0.5);
        }
        .dark .glass-card {
            background: rgba(15, 23, 42, 0.85);
            border-bottom: 1px solid rgba(51, 65, 85, 0.5);
        }
        
        /* Markdown overrides */
        .prose { max-width: 100%; }
        .dark .prose code { color: #93c5fd; }

        /* Mobile-friendly scrollable tables */
        .prose table {
            display: block;
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch; /* Native smooth scrolling on iOS */
            white-space: nowrap; /* Prevents text from squishing */
        }
        
        /* Custom styled scrollbar for the tables */
        .prose table::-webkit-scrollbar { height: 6px; }
        .prose table::-webkit-scrollbar-track { background: transparent; }
        .prose table::-webkit-scrollbar-thumb { 
            background-color: rgba(156, 163, 175, 0.5); 
            border-radius: 10px; 
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 dark:bg-dark dark:text-gray-100 transition-colors duration-300 min-h-screen flex flex-col font-sans">

    <nav class="sticky top-0 z-50 glass-card shadow-sm">
        <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center space-x-2 cursor-pointer" onclick="showList()">
                    <span class="text-2xl drop-shadow-md">⚽</span>
                    <h1 class="font-bold text-xl tracking-tight text-gray-900 dark:text-white">
                        Bet Bot <span class="text-blue-600 dark:text-blue-400">Predictions</span>
                    </h1>
                </div>
                <div class="flex items-center space-x-3 sm:space-x-4">
                    <button onclick="showResults()" class="flex items-center space-x-1 text-sm font-semibold bg-blue-100 text-blue-700 dark:bg-blue-900/50 dark:text-blue-300 px-4 py-2 rounded-full hover:bg-blue-200 dark:hover:bg-blue-800 transition-colors shadow-sm">
                        <span>📈</span>
                        <span class="hidden sm:inline">Results Tracker</span>
                    </button>
                    <button id="theme-toggle" onclick="toggleTheme()" class="p-2 rounded-full bg-gray-200 dark:bg-gray-800 hover:bg-gray-300 dark:hover:bg-gray-700 transition-colors shadow-inner text-lg leading-none" aria-label="Toggle theme">
                        🌚
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-8 sm:py-12 flex-grow w-full">
        
        <div id="list-view" class="space-y-8">
            <header class="text-center mb-10">
                <h2 class="text-3xl md:text-4xl font-extrabold text-gray-900 dark:text-white tracking-tight mb-3">
                    Match Analysis Archive
                </h2>
                <p class="text-gray-500 dark:text-gray-400 text-lg max-w-2xl mx-auto">
                    Browse past and present AI-driven insights for smarter decision-making.
                </p>
            </header>

            <div id="file-list" class="flex flex-col gap-4">
                <div class="flex flex-col items-center justify-center py-20 space-y-4 text-gray-500 dark:text-gray-400">
                    <div class="w-10 h-10 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
                    <p class="font-medium animate-pulse">Loading predictions…</p>
                </div>
            </div>
        </div>

        <div id="detail-view" class="hidden">
            <button onclick="showList()" class="flex items-center space-x-2 text-gray-500 hover:text-blue-600 dark:hover:text-blue-400 mb-6 transition-colors group font-medium">
                <span class="transform group-hover:-translate-x-1 transition-transform text-lg">&larr;</span>
                <span>Back to list</span>
            </button>
            
            <div class="bg-white dark:bg-darkSurface rounded-2xl shadow-xl border border-gray-100 dark:border-gray-800 overflow-hidden">
                <div class="bg-gray-50 dark:bg-gray-800/50 px-6 py-4 border-b border-gray-100 dark:border-gray-700">
                    <h2 id="detail-title" class="text-xl sm:text-2xl font-bold text-gray-900 dark:text-white"></h2>
                </div>
                <div id="md-content" class="p-6 sm:p-8 prose prose-blue dark:prose-invert max-w-none">
                    </div>
            </div>
        </div>

    </main>

    <footer class="border-t border-gray-200 dark:border-gray-800 py-8 mt-auto">
        <div class="max-w-4xl mx-auto px-4 text-center text-sm text-gray-400 dark:text-gray-500 font-medium">
            &copy; <span id="year"></span> Bet Bot. All rights reserved.
        </div>
    </footer>

    <script>
        // Set year in footer
        document.getElementById('year').textContent = new Date().getFullYear();

        // === THEME LOGIC ===
        const htmlEl = document.documentElement;
        const themeBtn = document.getElementById('theme-toggle');

        function applyTheme(theme) {
            if (theme === 'dark') {
                htmlEl.classList.add('dark');
                themeBtn.textContent = '☀️'; // Show Sun to switch back to light
            } else {
                htmlEl.classList.remove('dark');
                themeBtn.textContent = '🌚'; // Show Moon to switch back to dark
            }
        }

        function toggleTheme() {
            let current = localStorage.getItem('theme') || 'dark';
            let next = current === 'dark' ? 'light' : 'dark';
            localStorage.setItem('theme', next);
            applyTheme(next);
        }

        // Initialize theme
        applyTheme(localStorage.getItem('theme') || 'dark');

        // === CONFIG ===
        const OWNER = 'ja1984';
        const REPO  = 'bet-bot';
        const FOLDER = 'predictions';
        const BRANCH = 'main';
        const API_BASE = 'https://api.github.com/repos/' + OWNER + '/' + REPO;
        const NON_PREDICTION_FILES = ['results.md', 'RESULTS-TRACK-RECORD.md'];

        let files = [];
        let resultsFile = null;

        // UI Helpers
        const loadingHTML = `
            <div class="flex flex-col items-center justify-center py-12 space-y-4 text-gray-500 dark:text-gray-400">
                <div class="w-8 h-8 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
                <p class="font-medium animate-pulse">Loading content...</p>
            </div>`;
            
        const errorHTML = (msg) => `<div class="text-center p-8 text-red-500 font-medium bg-red-50 dark:bg-red-900/20 rounded-xl border border-red-100 dark:border-red-900/30">${msg}</div>`;

        // Parse markdown string into HTML and inject mobile table hints
        function renderMarkdown(mdText) {
            const container = document.getElementById('md-content');
            container.innerHTML = marked.parse(mdText);
            
            // Inject a mobile-only hint above any tables that are rendered
            container.querySelectorAll('table').forEach(table => {
                const hint = document.createElement('div');
                hint.className = 'text-xs text-blue-500 dark:text-blue-400 mb-2 sm:hidden flex items-center gap-1.5 italic font-medium';
                hint.innerHTML = '<span>↔️ Swipe table to view all columns</span>';
                table.parentNode.insertBefore(hint, table);
            });
        }

        function parseFileName(name) {
            const w = name.replace(/\.md$/i, '');
            const m = w.match(/^(\d{4}-\d{2}-\d{2})-(.+)$/);
            if (!m) return { date: '', league: w, raw: name };
            const league = m[2].replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
            return { date: m[1], league: league, raw: name };
        }

        function formatDate(ds) {
            try {
                var d = new Date(ds + 'T00:00:00');
                return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
            } catch(e) { return ds; }
        }

        async function showResults() {
            if (!resultsFile) return;
            document.getElementById('list-view').style.display = 'none';
            document.getElementById('detail-view').style.display = 'block';
            document.getElementById('detail-title').innerHTML = '&#128200; Results Tracker';
            document.getElementById('md-content').innerHTML = loadingHTML;
            window.location.hash = 'results.md';
            window.scrollTo(0, 0);
            
            try {
                var res = await fetch(resultsFile.download_url);
                if (!res.ok) throw new Error('Failed to fetch data');
                var md = await res.text();
                renderMarkdown(md);
            } catch(err) {
                document.getElementById('md-content').innerHTML = errorHTML(err.message);
            }
        }

        async function loadFileList() {
            var el = document.getElementById('file-list');
            try {
                var res = await fetch(API_BASE + '/contents/' + FOLDER + '?ref=' + BRANCH);
                if (!res.ok) throw new Error('GitHub API returned ' + res.status);
                var data = await res.json();

                var allMdFiles = data.filter(f => f.name.endsWith('.md'));
                resultsFile = allMdFiles.find(f => f.name === 'results.md') || null;

                files = allMdFiles
                    .filter(f => NON_PREDICTION_FILES.indexOf(f.name) === -1)
                    .map(f => {
                        var copy = Object.assign({}, f);
                        copy.parsed = parseFileName(f.name);
                        return copy;
                    })
                    .filter(f => f.parsed.date !== '')
                    .sort((a, b) => b.parsed.date.localeCompare(a.parsed.date));

                if (!files.length) {
                    el.innerHTML = `
                        <div class="text-center py-16 bg-white dark:bg-darkSurface rounded-2xl border border-gray-200 dark:border-gray-800 shadow-sm">
                            <div class="text-5xl mb-4">📭</div>
                            <p class="text-gray-500 dark:text-gray-400 font-medium">No prediction

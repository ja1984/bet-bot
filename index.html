<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bet Bot Predictions</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { dark: '#0f172a', darkSurface: '#1e293b' }
                }
            }
        }
    </script>

    <style>
        /* Glassmorphism effects */
        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(229, 231, 235, 0.5);
        }
        .dark .glass-card {
            background: rgba(15, 23, 42, 0.85);
            border-bottom: 1px solid rgba(51, 65, 85, 0.5);
        }
        
        /* Markdown overrides */
        .prose { max-width: 100%; }
        .dark .prose code { color: #93c5fd; }
        
        /* 1. HIDE REDUNDANT MARKDOWN TITLE */
        /* This hides the very first H1 in the markdown so it doesn't duplicate our UI header */
        .prose h1:first-child { display: none; }

        /* 2. DASHBOARD-STYLE TABLES */
        .prose table {
            display: block;
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch; 
            white-space: nowrap; 
            border-collapse: collapse;
            margin-top: 1rem;
        }
        
        /* Style the header row */
        .prose thead th {
            background-color: #f1f5f9; /* Light gray background */
            padding: 0.75rem 1rem !important;
            border-bottom: 2px solid #e2e8f0;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .dark .prose thead th {
            background-color: #1e293b;
            border-bottom: 2px solid #334155;
        }
        
        /* Style the cells and add subtle borders */
        .prose tbody td {
            padding: 0.75rem 1rem !important;
            border-bottom: 1px solid #f1f5f9;
            font-size: 0.95rem;
        }
        .dark .prose tbody td {
            border-bottom: 1px solid #1e293b;
        }
        
        /* Highlight rows on hover for easier reading */
        .prose tbody tr { transition: background-color 0.15s; }
        .prose tbody tr:hover td { background-color: #f8fafc; }
        .dark .prose tbody tr:hover td { background-color: #0f172a; }
        
        /* Custom styled scrollbar for the tables */
        .prose table::-webkit-scrollbar { height: 6px; }
        .prose table::-webkit-scrollbar-track { background: transparent; }
        .prose table::-webkit-scrollbar-thumb { 
            background-color: rgba(156, 163, 175, 0.5); 
            border-radius: 10px; 
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 dark:bg-dark dark:text-gray-100 transition-colors duration-300 min-h-screen flex flex-col font-sans">

    <nav class="sticky top-0 z-50 glass-card shadow-sm">
        <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center space-x-2 cursor-pointer" onclick="showList()">
                    <span class="text-2xl drop-shadow-md">⚽</span>
                    <h1 class="font-bold text-xl tracking-tight text-gray-900 dark:text-white">
                        Bet Bot <span class="text-blue-600 dark:text-blue-400">Predictions</span>
                    </h1>
                </div>
                <div class="flex items-center space-x-3 sm:space-x-4">
                    <button onclick="showResults()" class="flex items-center space-x-1 text-sm font-semibold bg-blue-100 text-blue-700 dark:bg-blue-900/50 dark:text-blue-300 px-4 py-2 rounded-full hover:bg-blue-200 dark:hover:bg-blue-800 transition-colors shadow-sm">
                        <span>📈</span>
                        <span class="hidden sm:inline">Results Tracker</span>
                    </button>
                    <button id="theme-toggle" onclick="toggleTheme()" class="p-2 rounded-full bg-gray-200 dark:bg-gray-800 hover:bg-gray-300 dark:hover:bg-gray-700 transition-colors shadow-inner text-lg leading-none" aria-label="Toggle theme">
                        🌚
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-8 sm:py-12 flex-grow w-full">
        
        <div id="list-view" class="space-y-8">
            <header class="text-center mb-10">
                <h2 class="text-3xl md:text-4xl font-extrabold text-gray-900 dark:text-white tracking-tight mb-3">
                    Match Analysis Archive
                </h2>
                <p class="text-gray-500 dark:text-gray-400 text-lg max-w-2xl mx-auto">
                    Browse past and present AI-driven insights for smarter decision-making.
                </p>
            </header>

            <div id="file-list" class="flex flex-col gap-4">
                <div class="flex flex-col items-center justify-center py-20 space-y-4 text-gray-500 dark:text-gray-400">
                    <div class="w-10 h-10 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
                    <p class="font-medium animate-pulse">Loading predictions…</p>
                </div>
            </div>
        </div>

        <div id="detail-view" class="hidden">
            <button onclick="showList()" class="flex items-center space-x-2 text-gray-500 hover:text-blue-600 dark:hover:text-blue-400 mb-6 transition-colors group font-medium">
                <span class="transform group-hover:-translate-x-1 transition-transform text-lg">&larr;</span>
                <span>Back to list</span>
            </button>
            
            <div class="bg-white dark:bg-darkSurface rounded-2xl shadow-xl border border-gray-100 dark:border-gray-800 overflow-hidden">
                <div class="bg-gray-50 dark:bg-gray-800/50 px-6 py-4 border-b border-gray-100 dark:border-gray-700">
                    <h2 id="detail-title" class="text-xl sm:text-2xl font-bold text-gray-900 dark:text-white"></h2>
                </div>
                <div id="md-content" class="p-6 sm:p-8 prose prose-blue dark:prose-invert max-w-none">
                    </div>
            </div>
        </div>

    </main>

    <footer class="border-t border-gray-200 dark:border-gray-800 py-8 mt-auto">
        <div class="max-w-4xl mx-auto px-4 text-center text-sm text-gray-400 dark:text-gray-500 font-medium">
            &copy; <span id="year"></span> Bet Bot. All rights reserved.
        </div>
    </footer>

    <script>
        // Set year in footer
        document.getElementById('year').textContent = new Date().getFullYear();

        // === THEME LOGIC ===
        const htmlEl = document.documentElement;
        const themeBtn = document.getElementById('theme-toggle');

        function applyTheme(theme) {
            if (theme === 'dark') {
                htmlEl.classList.add('dark');
                themeBtn.textContent = '☀️'; // Show Sun to switch back to light
            } else {
                htmlEl.classList.remove('dark');
                themeBtn.textContent = '🌚'; // Show Moon to switch back to dark
            }
        }

        function toggleTheme() {
            let current = localStorage.getItem('theme') || 'dark';
            let next = current === 'dark' ? 'light' : 'dark';
            localStorage.setItem('theme', next);
            applyTheme(next);
        }

        // Initialize theme
        applyTheme(localStorage.getItem('theme') || 'dark');

        // === CONFIG ===
        const OWNER = 'ja1984';
        const REPO  = 'bet-bot';
        const FOLDER = 'predictions';
        const BRANCH = 'main';
        const API_BASE = 'https://api.github.com/repos/' + OWNER + '/' + REPO;
        const NON_PREDICTION_FILES = ['results.md', 'RESULTS-TRACK-RECORD.md'];

        let files = [];
        let resultsFile = null;

        // UI Helpers
        const loadingHTML = `
            <div class="flex flex-col items-center justify-center py-12 space-y-4 text-gray-500 dark:text-gray-400">
                <div class="w-8 h-8 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
                <p class="font-medium animate-pulse">Loading content...</p>
            </div>`;
            
        const errorHTML = (msg) => `<div class="text-center p-8 text-red-500 font-medium bg-red-50 dark:bg-red-900/20 rounded-xl border border-red-100 dark:border-red-900/30">${msg}</div>`;

        // Parse markdown string into HTML and inject mobile table hints
        function renderMarkdown(mdText) {
            const container = document.getElementById('md-content');
            container.innerHTML = marked.parse(mdText);
            
            // Inject a mobile-only hint above any tables that are rendered
            container.querySelectorAll('table').forEach(table => {
                const hint = document.createElement('div');
                hint.className = 'text-xs text-blue-500 dark:text-blue-400 mb-2 sm:hidden flex items-center gap-1.5 italic font-medium';
                hint.innerHTML = '<span>↔️ Swipe table to view all columns</span>';
                table.parentNode.insertBefore(hint, table);
            });
        }

        function parseFileName(name) {
            const w = name.replace(/\.md$/i, '');
            const m = w.match(/^(\d{4}-\d{2}-\d{2})-(.+)$/);
            if (!m) return { date: '', league: w, raw: name };
            const league = m[2].replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
            return { date: m[1], league: league, raw: name };
        }

        function formatDate(ds) {
            try {
                var d = new Date(ds + 'T00:00:00');
                return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
            } catch(e) { return ds; }
        }

        let plChart = null;

        function parseResultsTable(md) {
            const rows = [];
            const lines = md.split('\n');
            for (const line of lines) {
                // Match table rows with date pattern, skip header/separator
                const m = line.match(/^\|\s*(2\d{3}-\d{2}-\d{2})\s*\|.*\|.*\|\s*(\d+)\/(\d+)\s*[✅❌]\s*\|\s*(.+?)\s*\|$/);
                if (!m) continue;
                const date = m[1];
                const wins = parseInt(m[2]);
                const total = parseInt(m[3]);
                const plRaw = m[4];
                // Parse profit/loss value
                let pl = 0;
                const numMatch = plRaw.match(/([+-]?\s*~?\+?)(\d+)/);
                if (numMatch) {
                    pl = parseInt(numMatch[2]);
                    if (plRaw.includes('-') && !plRaw.includes('+')) pl = -pl;
                }
                rows.push({ date, wins, total, pl });
            }
            // Reverse to chronological order
            rows.reverse();
            // Calculate cumulative P/L
            let cumulative = 0;
            for (const row of rows) {
                cumulative += row.pl;
                row.cumulative = cumulative;
            }
            return rows;
        }

        function renderPLChart(rows) {
            const isDark = htmlEl.classList.contains('dark');
            const labels = rows.map(r => {
                const d = new Date(r.date + 'T00:00:00');
                return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
            });
            const cumulativeData = rows.map(r => r.cumulative);
            const dailyData = rows.map(r => r.pl);

            const gridColor = isDark ? 'rgba(148, 163, 184, 0.15)' : 'rgba(148, 163, 184, 0.25)';
            const textColor = isDark ? '#94a3b8' : '#64748b';
            const zeroLineColor = isDark ? 'rgba(148, 163, 184, 0.3)' : 'rgba(148, 163, 184, 0.4)';

            // Gradient for cumulative line
            const canvas = document.getElementById('pl-chart');
            const ctx = canvas.getContext('2d');
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            const lastVal = cumulativeData[cumulativeData.length - 1] || 0;
            if (lastVal >= 0) {
                gradient.addColorStop(0, 'rgba(34, 197, 94, 0.25)');
                gradient.addColorStop(1, 'rgba(34, 197, 94, 0.02)');
            } else {
                gradient.addColorStop(0, 'rgba(239, 68, 68, 0.05)');
                gradient.addColorStop(1, 'rgba(239, 68, 68, 0.25)');
            }

            if (plChart) plChart.destroy();

            plChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: 'Cumulative P/L (kr)',
                            data: cumulativeData,
                            borderColor: lastVal >= 0 ? '#22c55e' : '#ef4444',
                            backgroundColor: gradient,
                            borderWidth: 2.5,
                            fill: true,
                            tension: 0.3,
                            pointBackgroundColor: cumulativeData.map(v => v >= 0 ? '#22c55e' : '#ef4444'),
                            pointBorderColor: cumulativeData.map(v => v >= 0 ? '#22c55e' : '#ef4444'),
                            pointRadius: 4,
                            pointHoverRadius: 6,
                        },
                        {
                            label: 'Daily P/L (kr)',
                            data: dailyData,
                            borderColor: isDark ? 'rgba(96, 165, 250, 0.7)' : 'rgba(59, 130, 246, 0.6)',
                            backgroundColor: 'transparent',
                            borderWidth: 1.5,
                            borderDash: [5, 5],
                            fill: false,
                            tension: 0.1,
                            pointBackgroundColor: dailyData.map(v => v >= 0 ? '#22c55e' : '#ef4444'),
                            pointBorderColor: dailyData.map(v => v >= 0 ? '#22c55e' : '#ef4444'),
                            pointRadius: 3,
                            pointHoverRadius: 5,
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    plugins: {
                        legend: {
                            labels: { color: textColor, font: { family: 'Inter', size: 12 }, usePointStyle: true, pointStyle: 'circle' }
                        },
                        tooltip: {
                            backgroundColor: isDark ? '#1e293b' : '#fff',
                            titleColor: isDark ? '#e2e8f0' : '#1e293b',
                            bodyColor: isDark ? '#cbd5e1' : '#475569',
                            borderColor: isDark ? '#334155' : '#e2e8f0',
                            borderWidth: 1,
                            padding: 12,
                            titleFont: { family: 'Inter', weight: '600' },
                            bodyFont: { family: 'Inter' },
                            callbacks: {
                                label: function(ctx) {
                                    const val = ctx.parsed.y;
                                    const prefix = val >= 0 ? '+' : '';
                                    return ctx.dataset.label + ': ' + prefix + val + ' kr';
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            grid: { color: gridColor },
                            ticks: { color: textColor, font: { family: 'Inter', size: 11 } }
                        },
                        y: {
                            grid: {
                                color: function(context) {
                                    if (context.tick.value === 0) return zeroLineColor;
                                    return gridColor;
                                },
                                lineWidth: function(context) {
                                    return context.tick.value === 0 ? 2 : 1;
                                }
                            },
                            ticks: {
                                color: textColor,
                                font: { family: 'Inter', size: 11 },
                                callback: function(val) { return (val >= 0 ? '+' : '') + val + ' kr'; }
                            }
                        }
                    }
                }
            });
        }

        async function showResults() {
            if (!resultsFile) return;
            document.getElementById('list-view').style.display = 'none';
            document.getElementById('detail-view').style.display = 'block';
            document.getElementById('detail-title').innerHTML = '&#128200; Results Tracker';
            document.getElementById('md-content').innerHTML = loadingHTML;
            window.location.hash = 'results.md';
            window.scrollTo(0, 0);

            try {
                var res = await fetch(resultsFile.download_url);
                if (!res.ok) throw new Error('Failed to fetch data');
                var md = await res.text();

                // Parse data and render chart + markdown
                var rows = parseResultsTable(md);
                var container = document.getElementById('md-content');

                // Build chart container + markdown below
                container.innerHTML = '<div class="not-prose mb-8"><div style="position:relative;height:320px"><canvas id="pl-chart"></canvas></div></div>' + marked.parse(md);

                // Inject mobile table hints
                container.querySelectorAll('table').forEach(table => {
                    const hint = document.createElement('div');
                    hint.className = 'text-xs text-blue-500 dark:text-blue-400 mb-2 sm:hidden flex items-center gap-1.5 italic font-medium';
                    hint.innerHTML = '<span>↔️ Swipe table to view all columns</span>';
                    table.parentNode.insertBefore(hint, table);
                });

                if (rows.length > 0) renderPLChart(rows);
            } catch(err) {
                document.getElementById('md-content').innerHTML = errorHTML(err.message);
            }
        }

        async function loadFileList() {
            var el = document.getElementById('file-list');
            try {
                var res = await fetch(API_BASE + '/contents/' + FOLDER + '?ref=' + BRANCH);
                
                // If GitHub rate-limits the user, throw a clear error
                if (res.status === 403 || res.status === 429) throw new Error("GitHub API limit reached. Please wait a few minutes before reloading.");
                if (!res.ok) throw new Error('GitHub API returned ' + res.status);
                
                var data = await res.json();
                
                // Extra safety check to ensure 'data' is an array before trying to filter it
                if (!Array.isArray(data)) throw new Error("Unexpected response from GitHub.");

                var allMdFiles = data.filter(f => f.name.endsWith('.md'));
                resultsFile = allMdFiles.find(f => f.name === 'results.md') || null;

                files = allMdFiles
                    .filter(f => NON_PREDICTION_FILES.indexOf(f.name) === -1)
                    .map(f => {
                        var copy = Object.assign({}, f);
                        copy.parsed = parseFileName(f.name);
                        return copy;
                    })
                    .filter(f => f.parsed.date !== '')
                    .sort((a, b) => b.parsed.date.localeCompare(a.parsed.date));

                if (!files.length) {
                    el.innerHTML = `
                        <div class="text-center py-16 bg-white dark:bg-darkSurface rounded-2xl border border-gray-200 dark:border-gray-800 shadow-sm">
                            <div class="text-5xl mb-4">📭</div>
                            <p class="text-gray-500 dark:text-gray-400 font-medium">No prediction files found yet.</p>
                        </div>`;
                    return;
                }

                el.innerHTML = files.map((f, i) => `
                    <a onclick="showDetail(${i})" role="button" tabindex="0" class="group flex items-center justify-between p-4 sm:p-5 bg-white dark:bg-darkSurface border border-gray-200 dark:border-gray-700 rounded-xl hover:shadow-md hover:border-blue-500 dark:hover:border-blue-500 transition-all cursor-pointer">
                        <div class="flex items-center gap-4 sm:gap-6 w-full">
                            <span class="bg-blue-50 text-blue-700 dark:bg-blue-900/30 dark:text-blue-300 text-xs sm:text-sm font-bold px-3 py-1.5 rounded-lg whitespace-nowrap tracking-wide">
                                ${formatDate(f.parsed.date)}
                            </span>
                            <span class="font-semibold text-gray-800 dark:text-gray-100 text-base sm:text-lg group-hover:text-blue-600 dark:group-hover:text-blue-400 transition-colors truncate">
                                ${f.parsed.league}
                            </span>
                        </div>
                        <span class="text-gray-300 dark:text-gray-600 group-hover:text-blue-500 transform group-hover:translate-x-1 transition-all text-xl ml-4">&rarr;</span>
                    </a>
                `).join('');

                handleHash();
            } catch(err) {
                el.innerHTML = errorHTML(err.message);
            }
        }

        async function showDetail(i) {
            var file = files[i];
            if (!file) return;
            document.getElementById('list-view').style.display = 'none';
            document.getElementById('detail-view').style.display = 'block';
            document.getElementById('detail-title').textContent = formatDate(file.parsed.date) + ' — ' + file.parsed.league;
            document.getElementById('md-content').innerHTML = loadingHTML;
            window.location.hash = file.name;
            window.scrollTo(0, 0);

            try {
                var res = await fetch(file.download_url);
                if (!res.ok) throw new Error('Failed to fetch data');
                var md = await res.text();
                renderMarkdown(md);
            } catch(err) {
                document.getElementById('md-content').innerHTML = errorHTML(err.message);
            }
        }

        function showList() {
            document.getElementById('list-view').style.display = 'block';
            document.getElementById('detail-view').style.display = 'none';
            window.location.hash = '';
            window.scrollTo(0, 0);
        }

        function handleHash() {
            var h = decodeURIComponent(window.location.hash.replace('#', ''));
            if (!h) return;
            if (h === 'results.md') { showResults(); return; }
            var idx = files.findIndex(f => f.name === h);
            if (idx !== -1) showDetail(idx);
        }

        window.addEventListener('hashchange', handleHash);
        
        // Boot up
        loadFileList();
    </script>
</body>
</html>
